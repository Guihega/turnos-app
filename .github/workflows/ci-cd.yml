name: Olinora CI/CD

on:
  push:
    branches: [main, 'epic/**']
  pull_request:
    branches: [main, 'epic/**']

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Tests
  # ─────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: turnospro_test
          POSTGRES_USER: turnospro
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U turnospro"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, pgsql, redis, mbstring, xml, bcmath
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          # Override for CI — sed replaces existing lines to avoid duplicates
          # (duplicate env vars break Laravel: first occurrence wins)
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=pgsql|" .env
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env
          sed -i "s|^DB_PORT=.*|DB_PORT=5432|" .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=turnospro_test|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=turnospro|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=testing|" .env
          sed -i "s|^CACHE_STORE=.*|CACHE_STORE=redis|" .env
          sed -i "s|^REDIS_HOST=.*|REDIS_HOST=127.0.0.1|" .env
          sed -i "s|^BROADCAST_CONNECTION=.*|BROADCAST_CONNECTION=null|" .env
          sed -i "s|^CIPHERSWEET_KEY=.*|CIPHERSWEET_KEY=${{ secrets.CIPHERSWEET_KEY }}|" .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  # ─────────────────────────────────────────────
  # Job 2: Deploy (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/turnospro

            echo "▸ Pulling latest code..."
            git pull origin main

            echo "▸ Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "▸ Installing JS dependencies..."
            npm ci --production=false

            echo "▸ Building assets..."
            sudo rm -rf /var/www/turnospro/public/build
            npm run build
            sudo chown -R www-data:www-data /var/www/turnospro/public/build

            echo "▸ Running migrations..."
            php artisan migrate --force

            echo "▸ Clearing caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "▸ Restarting queue workers..."
            php artisan queue:restart || true

            echo "✓ Deploy complete!"

      - name: Health check post-deploy
        id: healthcheck
        run: |
          echo "▸ Waiting 15s for services to stabilize..."
          sleep 15

          HEALTHY=false
          for i in 1 2 3; do
            echo "▸ Health check attempt $i/3..."
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              --max-time 10 \
              https://olinora.com.mx/health 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check passed (HTTP $HTTP_CODE)"
              cat /tmp/health_response.json
              HEALTHY=true
              break
            else
              echo "✗ Attempt $i failed (HTTP $HTTP_CODE)"
              cat /tmp/health_response.json 2>/dev/null || true
              if [ "$i" -lt 3 ]; then
                echo "  Retrying in 10s..."
                sleep 10
              fi
            fi
          done

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT

          if [ "$HEALTHY" = "false" ]; then
            echo "::error::Health check failed after 3 attempts"
          fi

      - name: Notify deploy result
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/turnospro
            COMMIT_MSG=$(git log -1 --pretty=format:"%s" 2>/dev/null || echo "unknown")
            COMMIT_SHA=$(git log -1 --pretty=format:"%h" 2>/dev/null || echo "unknown")
            HEALTHY="${{ steps.healthcheck.outputs.healthy }}"

            if [ "$HEALTHY" = "true" ]; then
              # Tag successful deploy for future rollback reference
              git tag -f last-known-good HEAD 2>/dev/null || true

              MSG="✅ *Deploy #${{ github.run_number }} OK*
            Commit: \`$COMMIT_SHA\` — $COMMIT_MSG
            Health: all checks passed"
            else
              MSG="🔴 *Deploy #${{ github.run_number }} — Health check FAILED*
            Commit: \`$COMMIT_SHA\` — $COMMIT_MSG
            ⚠️ App may be degraded. Check logs."
            fi

            php artisan tinker --execute="
              \$token = config('services.telegram.bot_token');
              \$chatId = config('services.telegram.chat_id');
              if (\$token && \$chatId) {
                  \$ch = curl_init(\"https://api.telegram.org/bot{\$token}/sendMessage\");
                  curl_setopt_array(\$ch, [
                      CURLOPT_POST => true,
                      CURLOPT_POSTFIELDS => [
                          'chat_id' => \$chatId,
                          'text' => \"$MSG\",
                          'parse_mode' => 'Markdown',
                      ],
                      CURLOPT_RETURNTRANSFER => true,
                      CURLOPT_TIMEOUT => 10,
                  ]);
                  curl_exec(\$ch);
                  curl_close(\$ch);
              }
            " 2>/dev/null || true
