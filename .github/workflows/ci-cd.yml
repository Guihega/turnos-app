name: Olinora CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Tests
  # ─────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: turnospro_test
          POSTGRES_USER: turnospro
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U turnospro"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, pgsql, redis, mbstring, xml, bcmath
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          # Override for CI
          echo "" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=turnospro_test" >> .env
          echo "DB_USERNAME=turnospro" >> .env
          echo "DB_PASSWORD=testing" >> .env
          echo "CACHE_STORE=redis" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "BROADCAST_CONNECTION=null" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  # ─────────────────────────────────────────────
  # Job 2: Deploy (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/turnospro

            echo "▸ Pulling latest code..."
            git pull origin main

            echo "▸ Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "▸ Installing JS dependencies..."
            npm ci --production=false

            echo "▸ Building assets..."
            sudo rm -rf /var/www/turnospro/public/build
            npm run build
            sudo chown -R www-data:www-data /var/www/turnospro/public/build

            echo "▸ Running migrations..."
            php artisan migrate --force

            echo "▸ Clearing caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "▸ Restarting queue workers..."
            php artisan queue:restart || true

            echo "✓ Deploy complete!"
